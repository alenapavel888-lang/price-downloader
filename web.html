<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подбор оборудования</title>
</head>
<body>

<h2>Подбор оборудования</h2>

<textarea id="query" style="width:100%;height:120px;"
placeholder="Введите запрос менеджера"></textarea>
<br><br>

<button onclick="send()">Подобрать</button>

<pre id="result" style="white-space:pre-wrap;margin-top:20px;"></pre>

<script>
async function send() {
    const query = document.getElementById("query").value;
    document.getElementById("result").innerText = "⏳ Выполняется поиск...";

    const res = await fetch("/search", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query })
    });

    const text = await res.text();
    document.getElementById("result").innerText = text;
}
</script>

</body>
</html>
