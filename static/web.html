<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Price Orchestrator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        textarea {
            width: 100%;
            height: 140px;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            white-space: pre-wrap;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>🧠 Агент подбора оборудования</h1>

<p>Введите список оборудования, ссылку или текст:</p>

<textarea id="query" placeholder="Например:
Мясорубка 300 кг
Стол производственный 1200
https://entero.ru/item/..."></textarea>

<br>

<input type="file" id="file">

<br>

<button onclick="send()">🔍 Найти</button>

<h2>Результат</h2>
<pre id="result">Ожидание запроса...</pre>

<script>
async function send() {
    const formData = new FormData();
    formData.append("query", document.getElementById("query").value);

    const file = document.getElementById("file").files[0];
    if (file) {
        formData.append("file", file);
    }

    const res = await fetch("/search", {
        method: "POST",
        body: formData
    });

    const text = await res.text();
    document.getElementById("result").innerText = text;
}
</script>

</body>
</html>
