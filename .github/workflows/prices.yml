name: Update price lists

on:
  schedule:
    - cron: "0 20 * * *" # 23:00 по Москве
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests yadisk

      - name: Run price downloader
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
        run: |
          python download_all.py
