name: Update price lists

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests yadisk playwright openpyxl pandas lxml html5lib
          playwright install chromium

      - name: Run price downloader
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
          RP_LOGIN: ${{ secrets.RP_LOGIN }}
          RP_PASSWORD: ${{ secrets.RP_PASSWORD }}
          BIO_LOGIN: ${{ secrets.BIO_LOGIN }}
          BIO_PASSWORD: ${{ secrets.BIO_PASSWORD }}
          TD_API_TOKEN: ${{ secrets.TD_API_TOKEN }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python download_all.py
