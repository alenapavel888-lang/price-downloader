name: Update price lists

on:
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install pandas openpyxl xlrd requests beautifulsoup4

      - name: Download prices from Yandex Disk
        env:
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
        run: |
          python download_from_yandex.py

      - name: Build index.db
        run: |
          python build_index.py

      - name: Commit index.db
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data index.db
          git commit -m "Update prices and rebuild index" || echo "No changes"
          git push
