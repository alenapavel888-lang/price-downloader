name: Run Orchestrator

on:
  workflow_dispatch:
    inputs:
      manager_query:
        description: "Запрос менеджера (например: мясорубка 70 кг)"
        required: true
        default: "мясорубка 70 кг"

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas \
            openpyxl \
            xlrd==2.0.1 \
            requests \
            beautifulsoup4

      - name: Run orchestrator
        env:
          MANAGER_QUERY: ${{ github.event.inputs.manager_query }}
        run: |
          python orchestrator.py
